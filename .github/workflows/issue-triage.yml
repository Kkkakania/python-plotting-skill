name: Issue triage checklist

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  checklist:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Add maintainer triage checklist
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          TRIAGE_MARKER: "<!-- python-plotting-skill-triage -->"
        run: |
          set -euo pipefail

          if gh issue view "$ISSUE_URL" --comments --json comments --jq '.comments[].body' | grep -Fq "$TRIAGE_MARKER"; then
            echo "Triage checklist already exists."
            exit 0
          fi

          cat > /tmp/triage-comment.md <<'COMMENT'
          <!-- python-plotting-skill-triage -->
          Thanks for opening this. I use the checklist below to keep Python plotting requests reproducible and safe to discuss in public.

          Maintainer triage:

          - [ ] Classify the track: `template`, `agent-workflow`, `docs`, or `ci`.
          - [ ] Set the evidence level: `none`, `single-report`, `reproducible`, or `ci-covered`.
          - [ ] Ask for a synthetic CSV or small generated sample if the report depends on private data.
          - [ ] Link the affected template, command, gallery output, workflow run, or documentation page.
          - [ ] Decide the next state: `Triaged`, `Awaiting feedback`, `Accepted`, or `Out of scope`.
          - [ ] If Python, Matplotlib, platform, or font availability matters, record versions without exposing local paths.

          This checklist is a lightweight fallback for the plotting-skill ecosystem board. It is not a claim about adoption or eligibility for any external benefit program.
          COMMENT

          gh issue comment "$ISSUE_URL" --body-file /tmp/triage-comment.md
